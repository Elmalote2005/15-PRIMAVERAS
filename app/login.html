                    <a class="nav-link fw-medium px-3" href="../assets/livingrooms.html">Salones</a>
                </li>
                <li class="nav-item">

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle fw-medium px-3" href="#" role="button" data-bs-toggle="dropdown">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle text-success fs-1 mb-3"></i>
                        <h3 class="fw-bold">Iniciar Sesión</h3>
                        <p class="text-muted">Accede a tu cuenta de 15 PRIMAVERAS</p>
                    </div>

                    <form novalidate>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" required>
                            <label for="correo">Correo electrónico</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="clave" placeholder="Contraseña" required>
                            <label for="clave">Contraseña</label>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="recordar">
                            <label class="form-check-label" for="recordar">
                                Recordarme en este dispositivo
                            </label>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-semibold py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                        </button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <a href="recover.html" class="text-decoration-none text-dark">¿Olvidaste tu contraseña?</a>
                        <br>
                        <a href="register.html" class="text-decoration-none text-dark mt-2 d-inline-block">¿No tienes cuenta? Regístrate</a>
                        <br>
                        <a href="../index.html" class="text-decoration-none text-muted mt-2 d-inline-block">
                            <i class="bi bi-arrow-left me-1"></i>Volver al inicio
                        </a>
                    </div>
                </div>
            </div>
        </div>
