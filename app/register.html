            <i class="bi bi-crown me-2 fs-4 text-success"></i>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" 
                aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menú">

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">

                        <i class="bi bi-house-door me-1"></i> Inicio

                    <a class="nav-link fw-medium px-3" href="login.html">Ingresar</a>

                    <a class="btn btn-success w-100 w-lg-auto" href="register.html">Registrarse</a>

            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-pencil-square text-success fs-1"></i>
                        <h3 class="fw-bold mt-2">Crear Cuenta</h3>
                        <p class="text-muted">Únete a 15 PRIMAVERAS para organizar tu evento</p>
                    </div>

                    <form>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="nombre" placeholder="Nombre" required>
                                    <label for="nombre">Nombre</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="apellidos" placeholder="Apellidos" required>
                                    <label for="apellidos">Apellidos</label>
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" class="form-control" id="correoReg" placeholder="correo@ejemplo.com" required>
                                    <label for="correoReg">Correo electrónico</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="tel" class="form-control" id="telefono" placeholder="Teléfono" required>
                                    <label for="telefono">Teléfono</label>
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="clave" placeholder="Contraseña" required>
                                    <label for="clave">Contraseña</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="confirmarClave" placeholder="Confirmar contraseña" required>
                                    <label for="confirmarClave">Confirmar contraseña</label>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-semibold">Registrarse</button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <a href="login.html" class="text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
                        <br>
                        <a href="../index.html" class="text-decoration-none mt-2 d-inline-block">Volver al inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
